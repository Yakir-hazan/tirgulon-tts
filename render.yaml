services:
  - type: web
    name: tirgulon-tts
    runtime: python
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: models
      mountPath: /opt/render/project/src
      sizeGB: 2
